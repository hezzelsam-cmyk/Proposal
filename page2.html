<body>

<div class="center">

  <p class="typewriter" data-text="Dad,"></p>

  <p class="typewriter" data-text="The last time we spoke about this, things didn't go very well. Looking back, I can see that there was a lot of miscommunication between us. I could have handled the situation better than I did, and for that, I want to apologize. I know I let you down."></p>

  <p class="typewriter" data-text="As time has passed, I've had the chance to reflect on everything that happened. I understand your perspective much better now, and honestly, I don't blame you for feeling the way you did. From where you were standing, you were trying to make the best decision based on the information you had. I respect that."></p>

  <p class="typewriter" data-text="What I hope is that you can also understand my perspective."></p>

  <p class="typewriter" data-text="The situation with school was never a premeditated plan. My original intention was to do both things at the same time and make progress on all fronts. Things didn't unfold the way I expected, and I regret the outcome. If I could go back and fix it, I would. Unfortunately, I can't change what has already happened. All I can do now is take responsibility for it and focus on what comes next."></p>

  <p class="typewriter" data-text="This is why I'm asking you to consider Nairobi."></p>

  <p class="typewriter" data-text="For the first time in a long time, I want to make a decision based not on what is easiest for me today, but on what will benefit me years from now. Staying at home in Nakuru feels safe and comfortable, but I don't believe comfort is what I need right now. I believe I need an environment that challenges me, pushes me, and forces me to grow."></p>

  <p class="typewriter" data-text="Moving to Nairobi is not about running away from responsibility. It's about moving toward opportunity."></p>

  <p class="typewriter" data-text="The practical side is simple. I would be able to do my bridging course and prepare for my exam in November from one place. Everything I need academically would be within reach, allowing me to focus fully on completing this chapter of my education."></p>

  <p class="typewriter" data-text="But there is another side to this that I feel is equally important."></p>

  <p class="typewriter" data-text="You have always known that I have been interested in trading. This isn't a new passion that appeared overnight. In fact, I was one of the first people in my circle to explore it seriously and introduce others to it. Many of the people I started alongside have progressed significantly. Today, some of them are making good money and continuing to improve."></p>

  <p class="typewriter" data-text="When I spoke about friends before, I don't think I explained myself properly. My desire to move isn't because I want to follow them around or depend on them. What interests me is the environment they now have access to."></p>

  <p class="typewriter" data-text="Nairobi offers exposure that simply doesn't exist in many other places. There are trading communities, experienced mentors, live trading sessions, networking opportunities, and people who spend every day sharpening their skills together. The value isn't just in being around friends. The value is in being around people who are actively pursuing the same goals and learning from individuals who have already achieved results."></p>

  <p class="typewriter" data-text="I know how much of a difference that environment can make."></p>

  <p class="typewriter" data-text="I'm not asking to go to Nairobi so I can waste time. I'm asking to go because I want to take advantage of every opportunity available while I prepare for my exam. I want to study. I want to learn. I want to improve. I want to spend these next few months building skills and positioning myself for the future."></p>

  <p class="typewriter" data-text="Even James was hesitant at first. I remember mentioning the same concerns when he was paying his school fees. That's how serious this decision is. It's not a casual thought. It's something I've spent a lot of time considering."></p>

  <p class="typewriter" data-text="I know this request is a stretch."></p>

  <p class="typewriter" data-text="I know there are risks."></p>

  <p class="typewriter" data-text="I know success is never guaranteed."></p>

  <p class="typewriter" data-text="But I also know myself."></p>

  <p class="typewriter" data-text="I know how much time I have invested into understanding markets. I know how much effort I have put into learning price action, chart analysis, and trading psychology. More importantly, I know how committed I am to becoming exceptional at it. Not because it is easy, but because it is one of the few things I have genuinely remained passionate about over the years."></p>

  <p class="typewriter" data-text="The ultimate goal has always been the same: to build a stable and successful future. Trading is not the only path to that future, but I believe it is a skill with extraordinary potential when approached with discipline, patience, and proper mentorship."></p>

  <p class="typewriter" data-text="There are countless details and experiences that I haven't included here, but the core message is simple:"></p>

  <p class="typewriter" data-text="Give me the opportunity to go to Nairobi, complete my bridging course, prepare for my exam, learn from experienced mentors, connect with serious communities, and fully utilize the opportunities available there."></p>

  <p class="typewriter" data-text="I won't waste them."></p>

  <p class="typewriter" data-text="The past year has felt like one setback after another. I've made mistakes. I've faced disappointments. I've learned lessons the hard way. But rather than focus on everything that has gone wrong, I want to focus on what can still go right."></p>

  <p class="typewriter" data-text="I genuinely believe that the next four months can change the direction of my year and, potentially, the direction of my future."></p>

  <p class="typewriter" data-text="All I'm asking for is the chance to prove it."></p>
